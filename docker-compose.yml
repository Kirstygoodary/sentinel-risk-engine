services:
  db:
    image: postgres:16-alpine
    container_name: risk-engine-db
    environment:
      POSTGRES_USER: risk
      POSTGRES_PASSWORD: risk
      POSTGRES_DB: risk_engine
    ports:
      - "5433:5432"
    volumes:
      - risk_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U risk -d risk_engine"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  risk_pgdata:
